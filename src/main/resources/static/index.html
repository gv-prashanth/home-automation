<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="ISO-8859-1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Droid Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00e5ff;
      --cyan-dim: #00a0b0;
      --cyan-glow: rgba(0, 229, 255, 0.4);
      --blue: #0d47a1;
      --deep-blue: #0a1628;
      --panel-bg: rgba(5, 15, 35, 0.55);
      --panel-border: rgba(0, 229, 255, 0.18);
      --glass: rgba(10, 22, 50, 0.45);
      --glass-hover: rgba(0, 229, 255, 0.08);
      --text-primary: #e0f7fa;
      --text-secondary: #80deea;
      --text-dim: #546e7a;
      --danger: #ff1744;
      --danger-glow: rgba(255, 23, 68, 0.5);
      --success: #00e676;
      --success-glow: rgba(0, 230, 118, 0.5);
      --amber: #ffab00;
    }

    html { scroll-behavior: smooth; }

    body {
      background: radial-gradient(ellipse at 20% 50%, #0a1628 0%, #000b18 50%, #000 100%);
      color: var(--text-primary);
      font-family: 'Rajdhani', 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      text-align: center;
      padding: 0;
    }

    /* ââ Star field canvas ââ */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    /* ââ Holographic grid overlay ââ */
    .holo-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* ââ Scanline effect ââ */
    .scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 229, 255, 0.008) 2px,
        rgba(0, 229, 255, 0.008) 4px
      );
    }

    .scanlines::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 200%;
      background: linear-gradient(transparent 0%, rgba(0,229,255,0.03) 50%, transparent 100%);
      animation: scanMove 8s linear infinite;
    }

    @keyframes scanMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(50%); }
    }

    /* ââ Main wrapper ââ */
    .main-wrapper {
      position: relative;
      z-index: 10;
      padding: 1.5em 1em 3em;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ââ Header ââ */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 2em;
      padding: 1.2em 0;
      animation: headerSlideIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes headerSlideIn {
      0% { opacity: 0; transform: translateY(-40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header img {
      height: 56px;
      width: auto;
      filter: drop-shadow(0 0 16px var(--cyan-glow)) drop-shadow(0 0 6px var(--cyan));
      animation: logoPulse 3s ease-in-out infinite, logoSpin 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 16px var(--cyan-glow)) drop-shadow(0 0 6px var(--cyan)); }
      50% { filter: drop-shadow(0 0 24px var(--cyan-glow)) drop-shadow(0 0 12px var(--cyan)) drop-shadow(0 0 40px rgba(0,229,255,0.15)); }
    }

    @keyframes logoSpin {
      0% { transform: rotateY(90deg); opacity: 0; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.5em;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow:
        0 0 10px var(--cyan-glow),
        0 0 30px rgba(0, 229, 255, 0.2),
        0 0 60px rgba(0, 229, 255, 0.1);
      animation: titleGlow 4s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 10px var(--cyan-glow), 0 0 30px rgba(0,229,255,0.2); }
      50% { text-shadow: 0 0 20px var(--cyan-glow), 0 0 50px rgba(0,229,255,0.3), 0 0 80px rgba(0,229,255,0.1); }
    }

    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7em;
      letter-spacing: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      display: block;
      margin-top: 4px;
    }

    /* ââ Settings button (far right of tab bar) ââ */
    .tab-settings {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      color: var(--text-dim);
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0,229,255,0.08);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 18px;
      margin-left: auto;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .tab-settings:hover {
      color: var(--cyan);
      background: rgba(0, 229, 255, 0.08);
    }

    .tab-settings.open {
      color: var(--cyan);
      background: rgba(0, 229, 255, 0.08);
      border-color: rgba(0,229,255,0.25);
    }

    /* ââ Settings panel dropdown ââ */
    .settings-panel {
      display: none;
      position: fixed;
      min-width: 200px;
      background: rgba(5, 15, 40, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 0 0 10px 10px;
      padding: 10px 0;
      z-index: 1000;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,229,255,0.05);
    }

    .settings-panel.open {
      display: block;
      animation: settingsReveal 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes settingsReveal {
      0% { opacity: 0; transform: translateY(-8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .settings-panel-header {
      font-family: 'Orbitron', monospace;
      font-size: 0.6em;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 6px 16px 8px;
      border-bottom: 1px solid rgba(0,229,255,0.1);
      margin-bottom: 4px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: var(--text-secondary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }

    .settings-item:hover {
      color: var(--cyan);
      background: rgba(0,229,255,0.06);
      text-shadow: 0 0 6px var(--cyan-glow);
    }

    .settings-item-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* ââ Glowing border utility ââ */
    .glow-border {
      border: 1px solid var(--panel-border);
      box-shadow:
        inset 0 0 30px rgba(0,229,255,0.03),
        0 0 15px rgba(0,229,255,0.05);
    }

    .glow-border:hover {
      border-color: rgba(0,229,255,0.35);
      box-shadow:
        inset 0 0 40px rgba(0,229,255,0.05),
        0 0 25px rgba(0,229,255,0.1);
    }

    /* ââ Tab bar ââ */
    .tab-bar {
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow-x: auto;
      padding: 0;
      width: 80%;
      margin: 0 auto;
      animation: fadeSlideUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tab-bar::-webkit-scrollbar { height: 3px; }
    .tab-bar::-webkit-scrollbar-track { background: transparent; }
    .tab-bar::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 3px; }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 48px;
      color: var(--text-dim);
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0,229,255,0.08);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: -1px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .tab::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .tab:first-child { margin-left: 0; }

    .tab:hover {
      color: var(--text-secondary);
      background: rgba(0, 229, 255, 0.06);
    }

    .tab:hover::before { opacity: 0.5; }

    .tab.active {
      color: var(--cyan);
      background: rgba(0, 229, 255, 0.08);
      border-color: rgba(0, 229, 255, 0.25);
      border-bottom: 1px solid transparent;
      font-weight: 700;
      text-shadow: 0 0 12px var(--cyan-glow);
    }

    .tab.active::before { opacity: 1; }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .tab .tab-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1;
      transition: all 0.3s;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .tab .tab-close:hover {
      color: var(--danger);
      background: rgba(255,23,68,0.15);
      text-shadow: 0 0 8px var(--danger-glow);
    }

    .tab-add {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      color: var(--text-dim);
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0,229,255,0.08);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 22px;
      margin-left: -1px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .tab-add:hover {
      color: var(--cyan);
      background: rgba(0, 229, 255, 0.08);
      text-shadow: 0 0 12px var(--cyan-glow);
    }

    /* ââ Add form ââ */
    .add-form {
      display: none;
      align-items: center;
      gap: 6px;
      margin-left: -1px;
      padding: 8px 12px;
      border: 1px solid rgba(0,229,255,0.2);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      background: rgba(0, 229, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .add-form.visible {
      display: flex;
      animation: formReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes formReveal {
      0% { opacity: 0; transform: scaleX(0.8); }
      100% { opacity: 1; transform: scaleX(1); }
    }

    .add-form input {
      height: 32px;
      width: 120px;
      font-size: 13px;
      font-family: 'Orbitron', monospace;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid rgba(0,229,255,0.3);
      background: rgba(0,10,30,0.6);
      color: var(--cyan);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      outline: none;
      transition: all 0.3s;
    }

    .add-form input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 15px rgba(0,229,255,0.2), inset 0 0 10px rgba(0,229,255,0.05);
    }

    .add-form input::placeholder {
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .holo-btn {
      height: 32px;
      padding: 0 14px;
      font-size: 12px;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid rgba(0,229,255,0.3);
      background: rgba(0,229,255,0.08);
      color: var(--cyan);
      transition: all 0.3s;
      text-transform: uppercase;
    }

    .holo-btn:hover {
      background: rgba(0,229,255,0.18);
      box-shadow: 0 0 15px rgba(0,229,255,0.2);
      transform: translateY(-1px);
    }

    .holo-btn.cancel {
      border-color: rgba(255,255,255,0.15);
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
    }

    .holo-btn.cancel:hover {
      color: var(--text-secondary);
      background: rgba(255,255,255,0.08);
      box-shadow: none;
    }

    /* ââ No droids message ââ */
    .no-droids {
      padding: 4em 2em;
      color: var(--text-dim);
      font-size: 1.2em;
      font-family: 'Orbitron', monospace;
      letter-spacing: 3px;
    }

    .no-droids b {
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan-glow);
    }

    /* ââ Table container (glass panel) ââ */
    .table-container {
      overflow: hidden;
      width: 80%;
      margin: 0 auto;
      border-radius: 0 0 16px 16px;
      border: 1px solid var(--panel-border);
      border-top: none;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.5),
        inset 0 0 60px rgba(0,229,255,0.02);
      animation: fadeSlideUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      position: relative;
    }

    .table-container::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 5%;
      width: 90%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
      opacity: 0.3;
    }

    /* ââ "Just now" persistent holographic glow + sweep ââ */
    @keyframes justNowSweep {
      0% { left: -100%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }

    .just-now-row {
      background: linear-gradient(90deg,
        rgba(0,229,255,0.0) 0%,
        rgba(0,229,255,0.08) 15%,
        rgba(0,229,255,0.12) 50%,
        rgba(0,229,255,0.08) 85%,
        rgba(0,229,255,0.0) 100%);
      box-shadow: inset 0 0 25px rgba(0,229,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .just-now-row::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(0,229,255,0.1) 30%,
        rgba(0,229,255,0.22) 50%,
        rgba(0,229,255,0.1) 70%,
        transparent 100%);
      animation: justNowSweep 6s ease-in-out infinite;
      animation-delay: var(--sweep-delay, 0s);
      pointer-events: none;
      z-index: 1;
    }

    .just-now-row td {
      color: #fff;
      text-shadow: 0 0 6px rgba(0,229,255,0.3);
    }

    .just-now-row td:last-child {
      color: var(--cyan);
      font-weight: 600;
    }

    /* ââ Table ââ */
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      color: var(--text-primary);
      table-layout: fixed;
      font-size: 1.05em;
    }

    th, td {
      border-bottom: 1px solid rgba(0,229,255,0.08);
      padding: 16px 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th:nth-child(1), td:nth-child(1) { width: 30%; }
    th:nth-child(2), td:nth-child(2) { width: 45%; }
    th:nth-child(3), td:nth-child(3) { width: 25%; }

    th {
      background: rgba(0,229,255,0.04);
      font-family: 'Orbitron', monospace;
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--cyan-dim);
      font-weight: 600;
      position: relative;
    }

    th::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
      opacity: 0.3;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: all 0.3s;
    }

    th.sortable:hover {
      color: var(--cyan);
      background: rgba(0, 229, 255, 0.08);
      text-shadow: 0 0 8px var(--cyan-glow);
    }

    tr {
      transition: background 0.3s ease;
      position: relative;
      overflow: hidden;
    }


    tr:last-child td { border-bottom: none; }

    td a {
      color: var(--cyan) !important;
      text-decoration: none !important;
      position: relative;
      transition: all 0.3s;
      font-weight: 500;
    }

    td a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--cyan);
      transition: width 0.3s;
      box-shadow: 0 0 6px var(--cyan-glow);
    }

    td a:hover {
      text-shadow: 0 0 10px var(--cyan-glow);
    }

    td a:hover::after { width: 100%; }

    /* ââ Row entrance animation ââ */
    @keyframes rowAppear {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ââ Modal ââ */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 5, 15, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      padding: 2em 0;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .modal-overlay.active {
      display: flex;
      animation: modalFadeIn 0.4s ease;
    }

    @keyframes modalFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .modal-card {
      background: linear-gradient(135deg, rgba(5,15,40,0.9) 0%, rgba(0,10,25,0.95) 100%);
      color: var(--text-primary);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 16px;
      padding: 2.5em;
      width: 90%;
      max-width: 950px;
      margin: auto;
      overflow: visible;
      text-align: left;
      position: relative;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 40px rgba(0,229,255,0.08),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 0 80px rgba(0,229,255,0.02);
      animation: modalCardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalCardIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .modal-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent);
    }

    .modal-card h2 {
      margin-top: 0;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.4em;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow);
      word-break: break-word;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;

    @keyframes shimmer {

    .loading-shimmer {
      background: linear-gradient(90deg, rgba(0,229,255,0.03) 25%, rgba(0,229,255,0.08) 50%, rgba(0,229,255,0.03) 75%);

      opacity: 0;
    }
  </style>

  <script>
    var droids = [];
    var activeDroid = null;
    var sortColumn = 'device';
    var sortAsc = true;
    var previousEntries = {};
    var isFirstLoad = true;

    function saveDroids() {
      localStorage.setItem("droids", JSON.stringify(droids));
      localStorage.setItem("activeDroid", activeDroid || "");
    }

    function loadDroids() {
      try {
        var stored = localStorage.getItem("droids");
        droids = stored ? JSON.parse(stored) : [];
      } catch (e) {
        droids = [];
      }

      var legacy = localStorage.getItem("homename");
      if (droids.length === 0 && legacy) {
        droids.push(legacy);
      }

      activeDroid = localStorage.getItem("activeDroid") || (droids.length > 0 ? droids[0] : null);
      if (activeDroid && droids.indexOf(activeDroid) === -1) {
        activeDroid = droids.length > 0 ? droids[0] : null;
      }
      saveDroids();
    }

    function renderTabs() {
      var bar = document.getElementById("tab-bar");
      var html = '';

      for (var i = 0; i < droids.length; i++) {
        var id = droids[i];
        var cls = (id === activeDroid) ? 'tab active' : 'tab';
        html += '<div class="' + cls + '" onclick="switchTab(\'' + escapeAttr(id) + '\')">';
        html += '<span class="tab-icon">&#9670;</span> ';
        html += escapeHtml(id);
        html += ' <span class="tab-close" onclick="event.stopPropagation();removeTab(\'' + escapeAttr(id) + '\')">&times;</span>';
        html += '</div>';
      }

      html += '<button class="tab-add" onclick="showAddForm();" title="Add Droid">+</button>';
      html += '<div id="add-form" class="add-form">';
      html += '<input type="text" id="new-droid-input" placeholder="DROID ID" onkeydown="addDroidOnEnter(event);" />';
      html += '<button class="holo-btn" onclick="addDroid();">Add</button>';
      html += '<button class="holo-btn cancel" onclick="hideAddForm();">Cancel</button>';
      html += '</div>';

      html += '<div class="tab-settings" id="settings-btn" onclick="toggleSettings(event);" title="Settings">&#9881;</div>';

      bar.innerHTML = html;
      renderContent();
    }

    function switchTab(id) {
      activeDroid = id;
      previousEntries = {};
      isFirstLoad = true;
      saveDroids();
      renderTabs();
      loadDoc();
    }

    function showAddForm() {
      document.getElementById("add-form").classList.add("visible");
      var input = document.getElementById("new-droid-input");
      input.value = '';
      input.focus();
    }

    function hideAddForm() {
      document.getElementById("add-form").classList.remove("visible");
    }

    function toggleSettings(e) {
      e.stopPropagation();
      var btn = document.getElementById("settings-btn");
      var panel = document.getElementById("settings-panel");
      var isOpen = panel.classList.contains("open");
      if (isOpen) {
        panel.classList.remove("open");
        btn.classList.remove("open");
        return;
      }
      var rect = btn.getBoundingClientRect();
      panel.style.top = rect.bottom + 'px';
      panel.style.right = (window.innerWidth - rect.right) + 'px';
      panel.classList.add("open");
      btn.classList.add("open");
      var closer = function(ev) {
        if (!btn.contains(ev.target) && !panel.contains(ev.target)) {
          panel.classList.remove("open");
          btn.classList.remove("open");
          document.removeEventListener("click", closer);
        }
      };
      setTimeout(function() { document.addEventListener("click", closer); }, 0);
    }

    function addDroid() {
      var input = document.getElementById("new-droid-input");
      var id = input.value.trim().toUpperCase();
      if (!id) return;
      if (droids.indexOf(id) !== -1) {
        activeDroid = id;
      } else {
        droids.push(id);
        activeDroid = id;
      }
      previousEntries = {};
      isFirstLoad = true;
      saveDroids();
      hideAddForm();
      renderTabs();
      loadDoc();
    }

    function addDroidOnEnter(e) {
      if (e.key === 'Enter') addDroid();
      if (e.key === 'Escape') hideAddForm();
    }

    function removeTab(id) {
      var idx = droids.indexOf(id);
      if (idx === -1) return;
      droids.splice(idx, 1);
      if (activeDroid === id) {
        if (droids.length > 0) {
          activeDroid = droids[Math.min(idx, droids.length - 1)];
        } else {
          activeDroid = null;
        }
        previousEntries = {};
        isFirstLoad = true;
      }
      saveDroids();
      renderTabs();
      loadDoc();
    }

    function renderContent() {
      if (droids.length === 0 || !activeDroid) {
        document.getElementById("resp").innerHTML =
          '<div class="no-droids">Click <b>+</b> to add a Droid ID</div>';
      }
    }

    function deleteDevice(droidId, deviceName) {
      var xhr = new XMLHttpRequest();
      var url = '/droid/' + droidId + '/devices/' + deviceName;

      xhr.open('DELETE', url, true);

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            closeDeviceModal();
            loadDoc();
          } else {
            console.error('Failed to delete device. Status:', xhr.status, xhr.statusText);
          }
        }
      };

      xhr.send();
    }

    function timeSince(date) {
      var seconds = Math.floor((new Date() - date) / 1000);
      var interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + " years ago";
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + " months ago";
      interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + " days ago";
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + " hours ago";
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + " minutes ago";
      return "just now";
    }

    function toggleSort(column) {
      if (sortColumn === column) {
        sortAsc = !sortAsc;
      } else {
        sortColumn = column;
        sortAsc = (column === 'time') ? false : true;
      }
      previousEntries = {};
      isFirstLoad = true;
      loadDoc();
    }

    function sortArrow(column) {
      if (sortColumn !== column) return '';
      if (column === 'time') {
        return sortAsc ? ' \u25BC' : ' \u25B2';
      }
      return sortAsc ? ' \u25B2' : ' \u25BC';
    }

    function buildRowKey(entry) {
      return entry.name + '|' + entry.reading + '|' + entry.readingTime;
    }

    function addSweep(row) {
      if (!row.style.getPropertyValue('--sweep-delay')) {
        row.style.setProperty('--sweep-delay', (Math.random() * 5).toFixed(2) + 's');
      }
    }

    function removeSweep(row) {
      row.style.removeProperty('--sweep-delay');
    }

    function playEntrance(row, delay) {
      row.animate([
        { opacity: 0, transform: 'translateX(-20px)' },
        { opacity: 1, transform: 'translateX(0)' }
      ], {
        duration: 500,
        delay: delay,
        easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
        fill: 'backwards'
      });
    }

    function animateEntrance(container) {
      var rows = container.querySelectorAll('tr[data-entrance]');
      for (var i = 0; i < rows.length; i++) {
        var delay = parseInt(rows[i].getAttribute('data-entrance'), 10) * 60;
        playEntrance(rows[i], delay);
        rows[i].removeAttribute('data-entrance');
      }
    }

    function loadDoc() {
      if (!activeDroid) {
        renderContent();
        return;
      }

      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function () {
        if (this.readyState == 4 && this.status == 200) {
          try {
            var myjson = JSON.parse(this.responseText);
            var entries = [];
            for (var key in myjson) {
              entries.push({ name: key, reading: myjson[key].deviceReading, readingTime: myjson[key].readingTime, raw: myjson[key] });
            }

            entries.sort(function(a, b) {
              var cmp = 0;
              if (sortColumn === 'device') {
                cmp = a.name.localeCompare(b.name);
              } else if (sortColumn === 'reading') {
                cmp = a.reading.localeCompare(b.reading);
              } else if (sortColumn === 'time') {
                cmp = a.readingTime.localeCompare(b.readingTime);
              }
              return sortAsc ? cmp : -cmp;
            });

            var newEntryMap = {};
            for (var i = 0; i < entries.length; i++) {
              newEntryMap[entries[i].name] = buildRowKey(entries[i]);
            }

            var resp = document.getElementById("resp");
            var existingTable = resp.querySelector('table');

            if (!existingTable || isFirstLoad) {
              var tableHtml = '<table><thead><tr>';
              tableHtml += '<th class="sortable" onclick="toggleSort(\'device\')">Device' + sortArrow('device') + '</th>';
              tableHtml += '<th class="sortable" onclick="toggleSort(\'reading\')">Reading' + sortArrow('reading') + '</th>';
              tableHtml += '<th class="sortable" onclick="toggleSort(\'time\')">Time' + sortArrow('time') + '</th>';
              tableHtml += '</tr></thead><tbody>';

              for (var i = 0; i < entries.length; i++) {
                var e = entries[i];
                var readingTime = timeSince(new Date(e.readingTime));
                var isJustNow = (readingTime === "just now");
                var rowClasses = '';
                if (isJustNow) rowClasses = 'just-now-row';

                tableHtml += '<tr class="' + rowClasses + '" data-device="' + escapeHtml(e.name) + '" data-entrance="' + i + '">' +
                  '<td><a href="#" onclick="openDeviceModal(\'' + encodeURIComponent(e.name) + '\');return false;">' + escapeHtml(e.name) + '</a></td>' +
                  '<td>' + escapeHtml(e.reading) + '</td>' +
                  '<td>' + escapeHtml(readingTime) + '</td></tr>';
              }

              tableHtml += '</tbody></table>';
              resp.innerHTML = tableHtml;
              animateEntrance(resp);
              var justNowRows = resp.querySelectorAll('.just-now-row');
              for (var j = 0; j < justNowRows.length; j++) addSweep(justNowRows[j]);
              isFirstLoad = false;
            } else {
              var thead = existingTable.querySelector('thead tr');
              if (thead) {
                thead.innerHTML =
                  '<th class="sortable" onclick="toggleSort(\'device\')">Device' + sortArrow('device') + '</th>' +
                  '<th class="sortable" onclick="toggleSort(\'reading\')">Reading' + sortArrow('reading') + '</th>' +
                  '<th class="sortable" onclick="toggleSort(\'time\')">Time' + sortArrow('time') + '</th>';
              }

              var tbody = existingTable.querySelector('tbody');
              var existingRows = {};
              var rows = tbody.querySelectorAll('tr');
              for (var r = 0; r < rows.length; r++) {
                var devName = rows[r].getAttribute('data-device');
                if (devName) existingRows[devName] = rows[r];
              }

              var newNames = [];
              for (var i = 0; i < entries.length; i++) newNames.push(entries[i].name);

              for (var devName in existingRows) {
                if (newNames.indexOf(devName) === -1) {
                  var row = existingRows[devName];
                  row.style.transition = 'opacity 0.3s, transform 0.3s';
                  row.style.opacity = '0';
                  row.style.transform = 'translateX(20px)';
                  (function(r) {
                    setTimeout(function() { if (r.parentNode) r.parentNode.removeChild(r); }, 300);
                  })(row);
                }
              }

              for (var i = 0; i < entries.length; i++) {
                var e = entries[i];
                var readingTime = timeSince(new Date(e.readingTime));
                var isJustNow = (readingTime === "just now");
                var currentKey = buildRowKey(e);
                var prevKey = previousEntries[e.name];
                var existingRow = existingRows[e.name];

                if (existingRow) {
                  var cells = existingRow.querySelectorAll('td');
                  if (cells.length >= 3) {
                    cells[1].textContent = e.reading;
                    cells[2].textContent = readingTime;
                  }

                  if (isJustNow) {
                    existingRow.classList.add('just-now-row');
                    addSweep(existingRow);
                  } else {
                    existingRow.classList.remove('just-now-row');
                    removeSweep(existingRow);
                  }

                  var parent = existingRow.parentNode;
                  var allRows = parent.querySelectorAll('tr');
                  if (allRows[i] !== existingRow) {
                    if (i < allRows.length) {
                      parent.insertBefore(existingRow, allRows[i]);
                    } else {
                      parent.appendChild(existingRow);
                    }
                  }
                } else {
                  var newRow = document.createElement('tr');
                  if (isJustNow) {
                    newRow.className = 'just-now-row';
                    addSweep(newRow);
                  }
                  newRow.setAttribute('data-device', e.name);
                  newRow.innerHTML =
                    '<td><a href="#" onclick="openDeviceModal(\'' + encodeURIComponent(e.name) + '\');return false;">' + escapeHtml(e.name) + '</a></td>' +
                    '<td>' + escapeHtml(e.reading) + '</td>' +
                    '<td>' + escapeHtml(readingTime) + '</td>';

                  var allRows = tbody.querySelectorAll('tr');
                  if (i < allRows.length) {
                    tbody.insertBefore(newRow, allRows[i]);
                  } else {
                    tbody.appendChild(newRow);
                  }
                  playEntrance(newRow, 0);
                }
              }
            }

            previousEntries = newEntryMap;
          } catch (err) {
            document.getElementById("resp").innerHTML = '';
          }
        }
      };

      xhttp.open("GET", '/droid/' + encodeURIComponent(activeDroid) + '/intents', true);
      xhttp.send();
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function openDeviceModal(encodedDeviceName) {
      var deviceName = decodeURIComponent(encodedDeviceName);
      var droidId = activeDroid;
      if (!droidId) return;

      var content = document.getElementById("modal-content");
      content.innerHTML = '<h2 class="loading-shimmer" style="padding:1em;border-radius:8px;">Accessing Databank...</h2>';
      document.getElementById("device-modal").classList.add("active");

      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/droid/' + encodeURIComponent(droidId) + '/devices/' + encodeURIComponent(deviceName), true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var data = JSON.parse(xhr.responseText);
              if (!data.deviceReading) {
                content.innerHTML = '<h2>Device not found</h2>';
                return;

      };

    function loadHistory(droidId, deviceName) {
      var hours = document.getElementById("history-hours").value;
      var container = document.getElementById("history-charts");
      var insightsContainer = document.getElementById("history-insights");
      container.innerHTML = '<div class="history-loading">Retrieving transmissions...</div>';
      if (insightsContainer) insightsContainer.innerHTML = '';
      destroyCharts();

      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/droid/' + encodeURIComponent(droidId) + '/devices/' + encodeURIComponent(deviceName) + '/history?hours=' + hours, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var historyData = JSON.parse(xhr.responseText);
              if (insightsContainer && historyData && historyData.length > 0) {
                var series = analyzeHistorySeries(historyData);
                var insights = computeInsights(series, historyData);
                renderInsights(insightsContainer, insights);
              }
              renderHistoryCharts(container, historyData);
            } catch (err) {
              container.innerHTML = '<div class="history-loading">Failed to decode transmission</div>';

    function destroyCharts() {

    function parseReadingValue(reading) {
      if (!reading) return [{ value: null, label: 'Unknown', raw: '', isCategorical: true }];
      var parts = reading.split(',');
      var results = [];
      for (var i = 0; i < parts.length; i++) {
        var part = parts[i].trim();
        var numMatch = part.match(/([-+]?\d*\.?\d+)/);
        if (numMatch) {
          var numVal = parseFloat(numMatch[1]);
          var label = part.replace(numMatch[0], '').trim();
          if (!label) label = 'Value';
          results.push({ value: numVal, label: label, raw: part, isCategorical: false });
        } else {
          var lower = part.toLowerCase();
          var catVal = null;
          if (lower === 'off' || lower === 'closed') catVal = 0;
          else if (lower === 'on' || lower === 'open') catVal = 1;

          if (catVal !== null) {
            results.push({ value: catVal, label: 'State', raw: part, isCategorical: true });
          } else {
            results.push({ value: null, label: part, raw: part, isCategorical: true });
          }
        }
      }
      return results;
    }

    function analyzeHistorySeries(history) {
      if (!history || history.length === 0) return [];
      var firstParsed = parseReadingValue(history[0].deviceReading);
      var seriesCount = firstParsed.length;
      var series = [];
      for (var s = 0; s < seriesCount; s++) {
        series.push({ label: firstParsed[s].label, data: [], isCategorical: firstParsed[s].isCategorical });
      }
      for (var i = 0; i < history.length; i++) {
        var parsed = parseReadingValue(history[i].deviceReading);
        var time = history[i].readingTime;
        for (var s = 0; s < seriesCount; s++) {
          if (s < parsed.length && parsed[s].value !== null) {
            series[s].data.push({ x: time, y: parsed[s].value });
            if (!parsed[s].isCategorical) series[s].isCategorical = false;
          } else if (s < parsed.length && parsed[s].isCategorical) {
            series[s].data.push({ x: time, y: null, label: parsed[s].raw });
          }
        }
      }
      return series;
    }

    function computeInsights(series, history) {
      var results = [];
      for (var i = 0; i < series.length; i++) {
        var s = series[i];
        var vals = s.data.filter(function(d) { return d.y !== null; }).map(function(d) { return d.y; });
        if (vals.length === 0) continue;

        var insight = { label: s.label, isCategorical: s.isCategorical, stats: {} };

        if (s.isCategorical) {
          var points = s.data.filter(function(d) { return d.y !== null; });
          var onTime = 0, offTime = 0, toggles = 0;

          if (points.length >= 2) {
            for (var v = 0; v < points.length - 1; v++) {
              var t0 = new Date(points[v].x).getTime();
              var t1 = new Date(points[v + 1].x).getTime();
              var dur = t1 - t0;
              if (points[v].y === 1) onTime += dur; else offTime += dur;
              if (points[v + 1].y !== points[v].y) toggles++;
            }
          } else if (points.length === 1) {
            if (points[0].y === 1) onTime = 1; else offTime = 1;
          }

          var totalTime = onTime + offTime;
          insight.stats.onPercent = totalTime > 0 ? Math.round((onTime / totalTime) * 100) : 0;
          insight.stats.offPercent = totalTime > 0 ? 100 - insight.stats.onPercent : 0;
          insight.stats.toggles = toggles;
        } else {
          var min = vals[0], max = vals[0], sum = 0;
          for (var v = 0; v < vals.length; v++) {
            if (vals[v] < min) min = vals[v];
            if (vals[v] > max) max = vals[v];
            sum += vals[v];
          }
          var avg = sum / vals.length;
          var minStr = String(min);
          var maxStr = String(max);
          var minDec = minStr.indexOf('.') !== -1 ? minStr.split('.')[1].length : 0;
          var maxDec = maxStr.indexOf('.') !== -1 ? maxStr.split('.')[1].length : 0;
          var decimals = Math.max(minDec, maxDec);
          insight.stats.min = min.toFixed(decimals);
          insight.stats.max = max.toFixed(decimals);
          insight.stats.avg = avg.toFixed(decimals);

          if (vals.length >= 3) {
            var valueRange = max - min;
            var stableThreshold = valueRange > 0 ? valueRange * 0.05 : 0.01;

            function linRegSlope(v) {
              var ln = v.length;
              var sx = 0, sy = 0, sxy = 0, sx2 = 0;
              for (var k = 0; k < ln; k++) {
                sx += k; sy += v[k]; sxy += k * v[k]; sx2 += k * k;
              }
              return (ln * sxy - sx * sy) / (ln * sx2 - sx * sx);
            }

            function classifySlope(slope, count) {
              var totalChange = Math.abs(slope * (count - 1));
              return totalChange > stableThreshold ? (slope > 0 ? 'Rising' : 'Falling') : 'Stable';
            }

            var overallSlope = linRegSlope(vals);
            var overallTrend = classifySlope(overallSlope, vals.length);

            var segStart = Math.floor(vals.length * 2 / 3);
            var seg = vals.slice(segStart);
            var recentSlope = linRegSlope(seg);
            var recentTrend = classifySlope(recentSlope, seg.length);

            insight.stats.trend = recentTrend;
            if (overallTrend !== recentTrend) {
              if (overallTrend === 'Stable' && recentTrend === 'Falling') insight.stats.trendContext = 'Peaked';
              else if (overallTrend === 'Stable' && recentTrend === 'Rising') insight.stats.trendContext = 'Recovering';
              else if (overallTrend === 'Rising' && recentTrend === 'Falling') insight.stats.trendContext = 'Peaked';
              else if (overallTrend === 'Rising' && recentTrend === 'Stable') insight.stats.trendContext = 'Leveling Off';
              else if (overallTrend === 'Falling' && recentTrend === 'Rising') insight.stats.trendContext = 'Recovering';
              else if (overallTrend === 'Falling' && recentTrend === 'Stable') insight.stats.trendContext = 'Leveling Off';
            }
          } else if (vals.length === 2) {
            var valueRange = max - min;
            var delta = vals[1] - vals[0];
            insight.stats.trend = Math.abs(delta) > valueRange * 0.05 ? (delta > 0 ? 'Rising' : 'Falling') : 'Stable';
          }
        }

        results.push(insight);
      }
      return results;
    }

    function renderInsights(container, insights) {
      if (!insights || insights.length === 0) return;
      var html = '';
      for (var i = 0; i < insights.length; i++) {
        var ins = insights[i];

        if (insights.length > 1) {
          html += '<div class="insight-series-label">' + escapeHtml(ins.label) + '</div>';

        html += '<div class="insights-grid">';

          html += '<div class="insight-card"><div class="insight-label">Off Time</div><div class="insight-value highlight-amber">' + ins.stats.offPercent + '%</div></div>';
          html += '<div class="insight-card"><div class="insight-label">Toggles</div><div class="insight-value highlight-cyan">' + ins.stats.toggles + '</div></div>';
        } else {

          html += '<div class="insight-card"><div class="insight-label">Max</div><div class="insight-value highlight-red">' + ins.stats.max + '</div></div>';
          html += '<div class="insight-card"><div class="insight-label">Average</div><div class="insight-value highlight-green">' + ins.stats.avg + '</div></div>';
          if (ins.stats.trend) {
            var trendColor = ins.stats.trend === 'Rising' ? 'highlight-red' : (ins.stats.trend === 'Falling' ? 'highlight-cyan' : 'highlight-green');
            var trendIcon = ins.stats.trend === 'Rising' ? '&#9650; ' : (ins.stats.trend === 'Falling' ? '&#9660; ' : '&#9644; ');
            var trendText = trendIcon + ins.stats.trend;
            if (ins.stats.trendContext) {
              trendText += '<span class="trend-context"> (' + ins.stats.trendContext + ')</span>';
            }
            html += '<div class="insight-card"><div class="insight-label">Trend</div><div class="insight-value ' + trendColor + '">' + trendText + '</div></div>';
          }
        }
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function renderHistoryCharts(container, history) {

      var chartColors = ['#00e5ff', '#00e676', '#ffab00', '#ff1744', '#d500f9', '#00b8d4'];

              }]
            },

              plugins: {

                        }

                },
                y: {

                    color: '#546e7a',
                    font: { family: 'Rajdhani', size: 11 },
                    stepSize: s.isCategorical ? 1 : undefined,
                    callback: s.isCategorical
                      ? function(val) { return val === 1 ? 'On' : 'Off'; }
                      : function(val) { return parseFloat(val.toPrecision(12)); }
                  },
                  min: s.isCategorical ? 0 : undefined,
                  max: s.isCategorical ? 1 : undefined
                }
              }
            }
          };
          var chart = new Chart(canvas.getContext('2d'), chartConfig);
          activeCharts.push(chart);

    function hexToRgba(hex, alpha) {
      var r = 0, g = 0, b = 0;
      if (hex.length === 4) {
        r = parseInt(hex[1] + hex[1], 16);
        g = parseInt(hex[2] + hex[2], 16);
        b = parseInt(hex[3] + hex[3], 16);
      } else if (hex.length === 7) {
        r = parseInt(hex.substring(1, 3), 16);
        g = parseInt(hex.substring(3, 5), 16);
        b = parseInt(hex.substring(5, 7), 16);
      }
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    /* âââââââââââââââââââââââââââââââââââââââ
       STAR FIELD (OffscreenCanvas Worker)
       âââââââââââââââââââââââââââââââââââââââ */

    var starfieldWorker = null;

    function getWorkerSource() {
      return '(' + function() {
        var canvas, ctx, stars = [], nebulaClouds = [];
        var mouseX = 0, mouseY = 0, W = 0, H = 0;

        function getStarColor() {
          var c = ['255,255,255','200,220,255','180,200,255','255,230,200','200,255,255'];
          return c[Math.floor(Math.random() * c.length)];
        }

        function initStars() {
          stars = []; nebulaClouds = [];
          for (var i = 0; i < 300; i++) {
            stars.push({
              x: Math.random() * W, y: Math.random() * H,
              radius: Math.random() * 0.8 + 0.2,
              opacity: Math.random() * 0.8 + 0.2,
              twinkleSpeed: Math.random() * 0.02 + 0.005,
              twinklePhase: Math.random() * Math.PI * 2,
              drift: (Math.random() - 0.5) * 0.03,
              color: getStarColor()
            });
          }
          for (var n = 0; n < 4; n++) {
            nebulaClouds.push({
              x: Math.random() * W, y: Math.random() * H,
              radius: Math.random() * 200 + 100,
              color: n % 2 === 0 ? 'rgba(0,100,180,' : 'rgba(80,0,120,',
              baseOpacity: Math.random() * 0.02 + 0.01,
              pulse: Math.random() * 0.005 + 0.002,
              phase: Math.random() * Math.PI * 2
            });
          }
        }

        function render() {
          ctx.clearRect(0, 0, W, H);
          var time = Date.now() * 0.001;
          var px = (mouseX - W / 2) * 0.005;
          var py = (mouseY - H / 2) * 0.005;

          for (var n = 0; n < nebulaClouds.length; n++) {
            var nc = nebulaClouds[n];
            var nOp = nc.baseOpacity + Math.sin(time * nc.pulse + nc.phase) * nc.baseOpacity * 0.5;
            var grad = ctx.createRadialGradient(
              nc.x + px * 0.3, nc.y + py * 0.3, 0,
              nc.x + px * 0.3, nc.y + py * 0.3, nc.radius);
            grad.addColorStop(0, nc.color + nOp + ')');
            grad.addColorStop(1, nc.color + '0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
          }

          for (var i = 0; i < stars.length; i++) {
            var s = stars[i];
            var tw = Math.sin(time * s.twinkleSpeed * 60 + s.twinklePhase);
            var op = s.opacity * (0.6 + tw * 0.4);
            s.x += s.drift + px * (s.radius * 0.3);
            s.y += py * (s.radius * 0.3);
            if (s.x < -10) s.x = W + 10;
            if (s.x > W + 10) s.x = -10;
            if (s.y < -10) s.y = H + 10;
            if (s.y > H + 10) s.y = -10;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + s.color + ',' + op + ')';
            ctx.fill();
            if (s.radius > 1.2 && op > 0.7) {
              ctx.beginPath();
              ctx.arc(s.x, s.y, s.radius * 3, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(' + s.color + ',' + (op * 0.08) + ')';
              ctx.fill();
            }
          }
          requestAnimationFrame(render);
        }

        self.onmessage = function(e) {
          var d = e.data;
          if (d.type === 'init') {
            canvas = d.canvas;
            ctx = canvas.getContext('2d');
            W = d.width; H = d.height;
            initStars();
            render();
          } else if (d.type === 'resize') {
            W = d.width; H = d.height;
            canvas.width = W; canvas.height = H;
          } else if (d.type === 'mouse') {
            mouseX = d.x; mouseY = d.y;
          }
        };
      }.toString() + ')()';
    }

    function initStarfield() {
      var canvas = document.getElementById('starfield');
      var useWorker = typeof canvas.transferControlToOffscreen === 'function';

      if (useWorker) {
        try {
          var offscreen = canvas.transferControlToOffscreen();
          var blob = new Blob([getWorkerSource()], { type: 'application/javascript' });
          var url = URL.createObjectURL(blob);
          starfieldWorker = new Worker(url);
          URL.revokeObjectURL(url);

          starfieldWorker.postMessage({
            type: 'init', canvas: offscreen,
            width: window.innerWidth, height: window.innerHeight
          }, [offscreen]);

          window.addEventListener('resize', function() {
            starfieldWorker.postMessage({
              type: 'resize',
              width: window.innerWidth, height: window.innerHeight
            });
          });

          document.addEventListener('mousemove', function(e) {
            starfieldWorker.postMessage({ type: 'mouse', x: e.clientX, y: e.clientY });
          });

          return;
        } catch (err) {
          /* fall through to main-thread fallback */
        }
      }

      initStarfieldFallback(canvas);
    }

    function initStarfieldFallback(canvas) {
      var ctx = canvas.getContext('2d');
      var stars = [], nebulaClouds = [];
      var mouseX = 0, mouseY = 0;
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      var colors = ['255,255,255','200,220,255','180,200,255','255,230,200','200,255,255'];
      for (var i = 0; i < 300; i++) {
        stars.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          radius: Math.random() * 0.8 + 0.2,
          opacity: Math.random() * 0.8 + 0.2,
          twinkleSpeed: Math.random() * 0.02 + 0.005,
          twinklePhase: Math.random() * Math.PI * 2,
          drift: (Math.random() - 0.5) * 0.03,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
      for (var n = 0; n < 4; n++) {
        nebulaClouds.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          radius: Math.random() * 200 + 100,
          color: n % 2 === 0 ? 'rgba(0,100,180,' : 'rgba(80,0,120,',
          baseOpacity: Math.random() * 0.02 + 0.01,
          pulse: Math.random() * 0.005 + 0.002,
          phase: Math.random() * Math.PI * 2
        });
      }

      window.addEventListener('resize', function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX; mouseY = e.clientY;
      });

      (function render() {
        var W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        var time = Date.now() * 0.001;
        var px = (mouseX - W / 2) * 0.005;
        var py = (mouseY - H / 2) * 0.005;
        for (var n = 0; n < nebulaClouds.length; n++) {
          var nc = nebulaClouds[n];
          var nOp = nc.baseOpacity + Math.sin(time * nc.pulse + nc.phase) * nc.baseOpacity * 0.5;
          var grad = ctx.createRadialGradient(
            nc.x + px * 0.3, nc.y + py * 0.3, 0,
            nc.x + px * 0.3, nc.y + py * 0.3, nc.radius);
          grad.addColorStop(0, nc.color + nOp + ')');
          grad.addColorStop(1, nc.color + '0)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);
        }
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          var tw = Math.sin(time * s.twinkleSpeed * 60 + s.twinklePhase);
          var op = s.opacity * (0.6 + tw * 0.4);
          s.x += s.drift + px * (s.radius * 0.3);
          s.y += py * (s.radius * 0.3);
          if (s.x < -10) s.x = W + 10;
          if (s.x > W + 10) s.x = -10;
          if (s.y < -10) s.y = H + 10;
          if (s.y > H + 10) s.y = -10;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + s.color + ',' + op + ')';
          ctx.fill();
          if (s.radius > 1.2 && op > 0.7) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius * 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + s.color + ',' + (op * 0.08) + ')';
            ctx.fill();
          }
        }
        requestAnimationFrame(render);
      })();
    }

    /* âââââââââââââââââââââââââââââââââââââââ
       FLOATING AMBIENT PARTICLES
       âââââââââââââââââââââââââââââââââââââââ */

    function initAmbientParticles() {
      var container = document.body;
      for (var i = 0; i < 20; i++) {
        var p = document.createElement('div');
        p.className = 'ambient-particle';
        container.appendChild(p);
        animateAmbientParticle(p);
      }
    }

    function animateAmbientParticle(el) {
      var startX = Math.random() * window.innerWidth;
      var startY = Math.random() * window.innerHeight;
      var duration = Math.random() * 15000 + 10000;
      var size = Math.random() * 3 + 1;

      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = startX + 'px';
      el.style.top = startY + 'px';

      var keyframes = [
        { opacity: 0, transform: 'translate(0, 0) scale(0.5)' },
        { opacity: 0.4, transform: 'translate(' + (Math.random() * 200 - 100) + 'px, ' + (-Math.random() * 300 - 50) + 'px) scale(1)' },
        { opacity: 0, transform: 'translate(' + (Math.random() * 400 - 200) + 'px, ' + (-Math.random() * 600 - 100) + 'px) scale(0.3)' }
      ];

      var anim = el.animate(keyframes, { duration: duration, easing: 'ease-in-out' });
      anim.onfinish = function() { animateAmbientParticle(el); };
    }

    /* âââââââââââââââââââââââââââââââââââââââ
       TYPING EFFECT FOR HEADER
       âââââââââââââââââââââââââââââââââââââââ */

    function typeEffect(element, text, speed) {
      var i = 0;
      element.textContent = '';
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }

    /* âââââââââââââââââââââââââââââââââââââââ
       INITIALIZATION
       âââââââââââââââââââââââââââââââââââââââ */

      initStarfield();

      var subtitle = document.querySelector('.subtitle');
      if (subtitle) {
        typeEffect(subtitle, 'COMMAND CENTER', 80);
      }
    }

    setInterval(loadDoc, 5000);
  </script>
